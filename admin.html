<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北苍星际 - 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f5f5f5; min-height: 100vh; }
        .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .login-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.3); width: 400px; text-align: center; }
        .login-title { font-size: 28px; font-weight: bold; color: #667eea; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        .form-input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 14px; transition: border-color 0.3s; }
        .form-input:focus { outline: none; border-color: #667eea; }
        .btn-login { width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        .btn-login:hover { transform: scale(1.05); }
        .admin-container { display: none; min-height: 100vh; }
        .sidebar { position: fixed; left: 0; top: 0; width: 250px; height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 0; z-index: 1000; }
        .sidebar-header { text-align: center; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 20px; }
        .sidebar-title { font-size: 24px; font-weight: bold; }
        .sidebar-subtitle { font-size: 12px; opacity: 0.8; margin-top: 5px; }
        .sidebar-menu { list-style: none; padding: 0; }
        .sidebar-item { padding: 15px 25px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 10px; }
        .sidebar-item:hover { background: rgba(255,255,255,0.1); }
        .sidebar-item.active { background: rgba(255,255,255,0.2); border-left: 4px solid white; }
        .sidebar-logout { position: absolute; bottom: 20px; left: 0; right: 0; padding: 15px 25px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 10px; border-top: 1px solid rgba(255,255,255,0.2); margin-top: 20px; }
        .sidebar-logout:hover { background: rgba(255,255,255,0.1); }
        .main-content { margin-left: 250px; padding: 30px; min-height: 100vh; }
        .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .page-title { font-size: 28px; font-weight: bold; color: #333; }
        .btn-add { padding: 12px 25px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        .btn-add:hover { transform: scale(1.05); }
        .data-table { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 15px; text-align: left; font-weight: bold; color: #333; border-bottom: 2px solid #e0e0e0; }
        td { padding: 15px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
        tr:hover { background: #f8f9fa; }
        .product-image { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status-active { background: #d4edda; color: #155724; }
        .status-inactive { background: #f8d7da; color: #721c24; }
        .action-buttons { display: flex; gap: 8px; }
        .btn-action { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; transition: all 0.2s; }
        .btn-edit { background: #667eea; color: white; }
        .btn-edit:hover { background: #764ba2; }
        .btn-delete { background: #e74c3c; color: white; }
        .btn-delete:hover { background: #c0392b; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 700px; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; }
        .modal-title { font-size: 24px; font-weight: bold; color: #667eea; }
        .modal-close { font-size: 30px; cursor: pointer; color: #999; transition: color 0.3s; }
        .modal-close:hover { color: #333; }
        .modal-body { margin-bottom: 20px; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; padding-top: 15px; border-top: 2px solid #f0f0f0; }
        .btn-cancel { padding: 10px 20px; background: #e0e0e0; color: #333; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
        .btn-save { padding: 10px 20px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .price-list { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .price-item { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .price-item:last-child { margin-bottom: 0; }
        .price-input { flex: 1; padding: 8px; border: 1px solid #e0e0e0; border-radius: 6px; }
        .btn-remove-price { padding: 8px 12px; background: #e74c3c; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .btn-add-price { width: 100%; padding: 10px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .toast { position: fixed; top: 20px; right: 20px; padding: 15px 25px; background: white; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); z-index: 3000; display: none; animation: slideIn 0.3s ease; }
        .toast.show { display: block; }
        .toast.success { border-left: 4px solid #28a745; }
        .toast.error { border-left: 4px solid #dc3545; }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .empty-state-icon { font-size: 60px; margin-bottom: 20px; }
        @media (max-width: 768px) {
            .sidebar { width: 200px; }
            .main-content { margin-left: 200px; padding: 20px; }
            .login-box { width: 90%; }
        }
    </style>
</head>
<body>
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h1 class="login-title">🏙️ 北苍星际管理后台</h1>
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" class="form-input" id="username" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" class="form-input" id="password" placeholder="请输入密码">
            </div>
            <button class="btn-login" id="loginBtn">登录</button>
        </div>
    </div>

    <div class="admin-container" id="adminContainer">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2 class="sidebar-title">北苍星际</h2>
                <p class="sidebar-subtitle">管理后台</p>
            </div>
            <ul class="sidebar-menu">
                <li class="sidebar-item active" data-page="products">📦 商品管理</li>
                <li class="sidebar-item" data-page="categories">📂 分类管理</li>
                <li class="sidebar-item" data-page="banners">🖼️ 轮播图管理</li>
                <li class="sidebar-item" data-page="settings">⚙️ 系统设置</li>
            </ul>
            <div class="sidebar-logout" id="logoutBtn">🚪 退出登录</div>
        </div>

        <div class="main-content">
            <div id="productsPage">
                <div class="content-header">
                    <h1 class="page-title">商品管理</h1>
                    <button class="btn-add" id="addProductBtn">+ 添加商品</button>
                </div>
                <div class="data-table">
                    <table id="productsTable">
                        <thead>
                            <tr>
                                <th>图片</th>
                                <th>商品名称</th>
                                <th>分类</th>
                                <th>状态</th>
                                <th>价格数量</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="categoriesPage" style="display: none;">
                <div class="content-header">
                    <h1 class="page-title">分类管理</h1>
                    <button class="btn-add" id="addCategoryBtn">+ 添加分类</button>
                </div>
                <div class="data-table">
                    <table id="categoriesTable">
                        <thead>
                            <tr>
                                <th>图标</th>
                                <th>分类名称</th>
                                <th>标识符</th>
                                <th>排序</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="categoriesTableBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="bannersPage" style="display: none;">
                <div class="content-header">
                    <h1 class="page-title">轮播图管理</h1>
                    <button class="btn-add" id="addBannerBtn">+ 添加轮播图</button>
                </div>
                <div class="data-table">
                    <table id="bannersTable">
                        <thead>
                            <tr>
                                <th>图片</th>
                                <th>标题</th>
                                <th>链接</th>
                                <th>排序</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="bannersTableBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="settingsPage" style="display: none;">
                <div class="content-header">
                    <h1 class="page-title">系统设置</h1>
                    <button class="btn-add" id="saveSettingsBtn">💾 保存设置</button>
                </div>
                <div style="background: white; padding: 30px; border-radius: 15px;">
                    <div class="form-group">
                        <label class="form-label">网站名称</label>
                        <input type="text" class="form-input" id="siteName" placeholder="请输入网站名称">
                    </div>
                    <div class="form-group">
                        <label class="form-label">网站口号</label>
                        <input type="text" class="form-input" id="siteSlogan" placeholder="请输入网站口号">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Wavepay收款码</label>
                        <input type="text" class="form-input" id="paymentQrCode" placeholder="请输入收款码图片URL">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Telegram客服</label>
                        <input type="text" class="form-input" id="contactTelegram" placeholder="请输入Telegram用户名">
                    </div>
                    <div class="form-group">
                        <label class="form-label">联系电话</label>
                        <input type="text" class="form-input" id="contactPhone" placeholder="请输入联系电话">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Telegram群组</label>
                        <input type="text" class="form-input" id="contactGroup" placeholder="请输入群组ID">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Telegram频道</label>
                        <input type="text" class="form-input" id="contactChannel" placeholder="请输入频道ID">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="productModalTitle">添加商品</h2>
                <span class="modal-close" id="closeProductModal">&times;</span>
            </div>
            <div class="modal-body">
                <input type="hidden" id="productId">
                <div class="form-group">
                    <label class="form-label">商品名称 *</label>
                    <input type="text" class="form-input" id="productName" placeholder="请输入商品名称">
                </div>
                <div class="form-group">
                    <label class="form-label">分类 *</label>
                    <select class="form-input" id="productCategory"></select>
                </div>
                <div class="form-group">
                    <label class="form-label">子分类</label>
                    <input type="text" class="form-input" id="productSubCategory" placeholder="如：kuaishou, douyin">
                </div>
                <div class="form-group">
                    <label class="form-label">商品图片URL *</label>
                    <input type="text" class="form-input" id="productImage" placeholder="请输入图片URL">
                </div>
                <div class="form-group">
                    <label class="form-label">商品描述</label>
                    <textarea class="form-input" id="productDescription" rows="3" placeholder="请输入商品描述"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">状态</label>
                    <select class="form-input" id="productStatus">
                        <option value="active">启用</option>
                        <option value="inactive">禁用</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">价格列表</label>
                    <div class="price-list" id="priceList"></div>
                    <button class="btn-add-price" id="addPriceBtn">+ 添加价格</button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="cancelProductBtn">取消</button>
                <button class="btn-save" id="saveProductBtn">保存</button>
            </div>
        </div>
    </div>

    <div class="modal" id="categoryModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="categoryModalTitle">添加分类</h2>
                <span class="modal-close" id="closeCategoryModal">&times;</span>
            </div>
            <div class="modal-body">
                <input type="hidden" id="categoryId">
                <div class="form-group">
                    <label class="form-label">分类名称 *</label>
                    <input type="text" class="form-input" id="categoryName" placeholder="请输入分类名称">
                </div>
                <div class="form-group">
                    <label class="form-label">标识符 *</label>
                    <input type="text" class="form-input" id="categorySlug" placeholder="如：live, game">
                </div>
                <div class="form-group">
                    <label class="form-label">图标</label>
                    <input type="text" class="form-input" id="categoryIcon" placeholder="如：📺, 🎮">
                </div>
                <div class="form-group">
                    <label class="form-label">排序</label>
                    <input type="number" class="form-input" id="categorySort" placeholder="数字越小越靠前">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="cancelCategoryBtn">取消</button>
                <button class="btn-save" id="saveCategoryBtn">保存</button>
            </div>
        </div>
    </div>

    <div class="modal" id="bannerModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="bannerModalTitle">添加轮播图</h2>
                <span class="modal-close" id="closeBannerModal">&times;</span>
            </div>
            <div class="modal-body">
                <input type="hidden" id="bannerId">
                <div class="form-group">
                    <label class="form-label">标题</label>
                    <input type="text" class="form-input" id="bannerTitle" placeholder="请输入标题">
                </div>
                <div class="form-group">
                    <label class="form-label">图片URL *</label>
                    <input type="text" class="form-input" id="bannerImage" placeholder="请输入图片URL">
                </div>
                <div class="form-group">
                    <label class="form-label">链接URL</label>
                    <input type="text" class="form-input" id="bannerLink" placeholder="请输入链接URL">
                </div>
                <div class="form-group">
                    <label class="form-label">排序</label>
                    <input type="number" class="form-input" id="bannerSort" placeholder="数字越小越靠前">
                </div>
                <div class="form-group">
                    <label class="form-label">状态</label>
                    <select class="form-input" id="bannerStatus">
                        <option value="active">启用</option>
                        <option value="inactive">禁用</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="cancelBannerBtn">取消</button>
                <button class="btn-save" id="saveBannerBtn">保存</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
    (function() {
        const DB = window.supabase.createClient('https://ufxglsigclmqovqbfzad.supabase.co', 'sb_publishable_e03LbnJ7Gs4flKRK8zqubA_KkT6CfZX');
        const ADMIN_PASS = 'beicang888';
        let currentPrices = [];
        let editingProduct = null;
        let editingCategory = null;
        let editingBanner = null;

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show ' + type;
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        document.getElementById('loginBtn').addEventListener('click', function() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if (u === 'admin' && p === ADMIN_PASS) {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('adminContainer').style.display = 'block';
                showToast('登录成功', 'success');
                loadProducts();
            } else {
                showToast('用户名或密码错误', 'error');
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', function() {
            if (confirm('确定要退出登录吗？')) {
                document.getElementById('adminContainer').style.display = 'none';
                document.getElementById('loginContainer').style.display = 'flex';
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                showToast('已退出登录', 'success');
            }
        });

        document.querySelectorAll('.sidebar-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                const page = this.getAttribute('data-page');
                document.querySelectorAll('.main-content > div').forEach(d => d.style.display = 'none');
                document.getElementById(page + 'Page').style.display = 'block';
                if (page === 'products') loadProducts();
                if (page === 'categories') loadCategories();
                if (page === 'banners') loadBanners();
                if (page === 'settings') loadSettings();
            });
        });

        function loadProducts() {
            DB.from('products').select('*,categories(name)').order('sort_order').then(({data,error}) => {
                if (error) return showToast('加载失败: '+error.message,'error');
                Promise.all(data.map(p => DB.from('product_prices').select('*',{count:'exact',head:true}).eq('product_id',p.id).then(({count}) => ({...p,price_count:count||0}))))
                .then(products => renderProducts(products));
            });
        }

        function renderProducts(products) {
            const tbody = document.getElementById('productsTableBody');
            if (!products.length) {
                tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="empty-state-icon">📦</div><p>暂无商品</p></div></td></tr>';
                return;
            }
            tbody.innerHTML = products.map(p => `
                <tr>
                    <td><img src="${p.image_url}" class="product-image"></td>
                    <td>${p.name}</td>
                    <td>${p.categories?.name||'-'}</td>
                    <td><span class="status-badge status-${p.status}">${p.status==='active'?'启用':'禁用'}</span></td>
                    <td>${p.price_count}个</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn-action btn-edit" data-id="${p.id}" data-action="editProduct">编辑</button>
                            <button class="btn-action btn-delete" data-id="${p.id}" data-action="deleteProduct">删除</button>
                        </div>
                    </td>
                </tr>
            `).join('');
            attachTableEvents();
        }

        async function openProductModal(id = null) {
            editingProduct = null;
            currentPrices = [];
            const {data:cats} = await DB.from('categories').select('*').order('sort_order');
            document.getElementById('productCategory').innerHTML = cats.map(c => `<option value="${c.slug}">${c.name}</option>`).join('');
            
            if (id) {
                const {data:p} = await DB.from('products').select('*').eq('id',id).single();
                if (p) {
                    editingProduct = p;
                    document.getElementById('productModalTitle').textContent = '编辑商品';
                    document.getElementById('productId').value = p.id;
                    document.getElementById('productName').value = p.name;
                    document.getElementById('productCategory').value = p.category_slug;
                    document.getElementById('productSubCategory').value = p.sub_category||'';
                    document.getElementById('productImage').value = p.image_url;
                    document.getElementById('productDescription').value = p.description||'';
                    document.getElementById('productStatus').value = p.status;
                    const {data:prices} = await DB.from('product_prices').select('*').eq('product_id',id).order('sort_order');
                    currentPrices = prices||[];
                    renderPrices();
                }
            } else {
                document.getElementById('productModalTitle').textContent = '添加商品';
                document.getElementById('productId').value = '';
                document.getElementById('productName').value = '';
                document.getElementById('productSubCategory').value = '';
                document.getElementById('productImage').value = '';
                document.getElementById('productDescription').value = '';
                document.getElementById('productStatus').value = 'active';
                currentPrices = [];
                renderPrices();
            }
            document.getElementById('productModal').classList.add('active');
        }

        function renderPrices() {
            document.getElementById('priceList').innerHTML = currentPrices.map((pr,idx) => `
                <div class="price-item">
                    <input class="price-input" placeholder="规格" value="${pr.name}" onchange="currentPrices[${idx}].name=this.value">
                    <input class="price-input" placeholder="价格" value="${pr.value}" onchange="currentPrices[${idx}].value=this.value">
                    <button class="btn-remove-price" onclick="removePrice(${idx})">删除</button>
                </div>
            `).join('');
        }

        window.removePrice = function(idx) {
            currentPrices.splice(idx,1);
            renderPrices();
        };

        document.getElementById('addPriceBtn').addEventListener('click', function() {
            currentPrices.push({name:'',value:''});
            renderPrices();
        });

        document.getElementById('closeProductModal').addEventListener('click', function() {
            document.getElementById('productModal').classList.remove('active');
        });

        document.getElementById('cancelProductBtn').addEventListener('click', function() {
            document.getElementById('productModal').classList.remove('active');
        });

        document.getElementById('saveProductBtn').addEventListener('click', async function() {
            const id = document.getElementById('productId').value;
            const data = {
                name: document.getElementById('productName').value,
                category_slug: document.getElementById('productCategory').value,
                sub_category: document.getElementById('productSubCategory').value,
                image_url: document.getElementById('productImage').value,
                description: document.getElementById('productDescription').value,
                status: document.getElementById('productStatus').value
            };
            if (!data.name || !data.category_slug || !data.image_url) return showToast('请填写必填字段','error');
            try {
                if (id) {
                    await DB.from('products').update(data).eq('id',id);
                    await DB.from('product_prices').delete().eq('product_id',id);
                    for (let i=0; i<currentPrices.length; i++) {
                        if (currentPrices[i].name && currentPrices[i].value) {
                            await DB.from('product_prices').insert({product_id:id,name:currentPrices[i].name,value:currentPrices[i].value,sort_order:i});
                        }
                    }
                    showToast('更新成功','success');
                } else {
                    const {data:newP} = await DB.from('products').insert([data]).select().single();
                    for (let i=0; i<currentPrices.length; i++) {
                        if (currentPrices[i].name && currentPrices[i].value) {
                            await DB.from('product_prices').insert({product_id:newP.id,name:currentPrices[i].name,value:currentPrices[i].value,sort_order:i});
                        }
                    }
                    showToast('添加成功','success');
                }
                document.getElementById('productModal').classList.remove('active');
                loadProducts();
            } catch(e) {
                showToast('保存失败: '+e.message,'error');
            }
        });

        document.getElementById('addProductBtn').addEventListener('click', () => openProductModal());

        function attachTableEvents() {
            document.querySelectorAll('[data-action="editProduct"]').forEach(btn => {
                btn.addEventListener('click', () => openProductModal(btn.getAttribute('data-id')));
            });
            document.querySelectorAll('[data-action="deleteProduct"]').forEach(btn => {
                btn.addEventListener('click', async function() {
                    if (confirm('确定删除？')) {
                        await DB.from('products').delete().eq('id',this.getAttribute('data-id'));
                        showToast('删除成功','success');
                        loadProducts();
                    }
                });
            });
        }

        // 分类
        function loadCategories() {
            DB.from('categories').select('*').order('sort_order').then(({data,error}) => {
                if (error) return showToast('加载失败: '+error.message,'error');
                document.getElementById('categoriesTableBody').innerHTML = data.length ? data.map(c => `
                    <tr>
                        <td style="font-size:24px;">${c.icon||'📦'}</td>
                        <td>${c.name}</td>
                        <td>${c.slug}</td>
                        <td>${c.sort_order}</td>
                        <td>
                            <div class="action-buttons">
                                <button class="btn-action btn-edit" data-id="${c.id}" data-action="editCategory">编辑</button>
                                <button class="btn-action btn-delete" data-id="${c.id}" data-action="deleteCategory">删除</button>
                            </div>
                        </td>
                    </tr>
                `).join('') : '<tr><td colspan="5"><div class="empty-state"><div class="empty-state-icon">📂</div><p>暂无分类</p></div></td></tr>';
                attachCategoryEvents();
            });
        }

        async function openCategoryModal(id = null) {
            editingCategory = null;
            if (id) {
                const {data:c} = await DB.from('categories').select('*').eq('id',id).single();
                if (c) {
                    editingCategory = c;
                    document.getElementById('categoryModalTitle').textContent = '编辑分类';
                    document.getElementById('categoryId').value = c.id;
                    document.getElementById('categoryName').value = c.name;
                    document.getElementById('categorySlug').value = c.slug;
                    document.getElementById('categoryIcon').value = c.icon||'';
                    document.getElementById('categorySort').value = c.sort_order;
                }
            } else {
                document.getElementById('categoryModalTitle').textContent = '添加分类';
                document.getElementById('categoryId').value = '';
                document.getElementById('categoryName').value = '';
                document.getElementById('categorySlug').value = '';
                document.getElementById('categoryIcon').value = '';
                document.getElementById('categorySort').value = '0';
            }
            document.getElementById('categoryModal').classList.add('active');
        }

        document.getElementById('addCategoryBtn').addEventListener('click', () => openCategoryModal());
        document.getElementById('closeCategoryModal').addEventListener('click', () => document.getElementById('categoryModal').classList.remove('active'));
        document.getElementById('cancelCategoryBtn').addEventListener('click', () => document.getElementById('categoryModal').classList.remove('active'));
        document.getElementById('saveCategoryBtn').addEventListener('click', async function() {
            const id = document.getElementById('categoryId').value;
            const data = {
                name: document.getElementById('categoryName').value,
                slug: document.getElementById('categorySlug').value,
                icon: document.getElementById('categoryIcon').value,
                sort_order: parseInt(document.getElementById('categorySort').value)||0
            };
            if (!data.name || !data.slug) return showToast('请填写必填字段','error');
            try {
                if (id) {
                    await DB.from('categories').update(data).eq('id',id);
                    showToast('更新成功','success');
                } else {
                    await DB.from('categories').insert([data]);
                    showToast('添加成功','success');
                }
                document.getElementById('categoryModal').classList.remove('active');
                loadCategories();
            } catch(e) {
                showToast('保存失败: '+e.message,'error');
            }
        });

        function attachCategoryEvents() {
            document.querySelectorAll('[data-action="editCategory"]').forEach(btn => {
                btn.addEventListener('click', () => openCategoryModal(btn.getAttribute('data-id')));
            });
            document.querySelectorAll('[data-action="deleteCategory"]').forEach(btn => {
                btn.addEventListener('click', async function() {
                    if (confirm('确定删除？')) {
                        await DB.from('categories').delete().eq('id',this.getAttribute('data-id'));
                        showToast('删除成功','success');
                        loadCategories();
                    }
                });
            });
        }

        // 轮播图
        function loadBanners() {
            DB.from('banners').select('*').order('sort_order').then(({data,error}) => {
                if (error) return showToast('加载失败: '+error.message,'error');
                document.getElementById('bannersTableBody').innerHTML = data.length ? data.map(b => `
                    <tr>
                        <td><img src="${b.image_url}" style="width:150px;height:80px;object-fit:cover;border-radius:8px;"></td>
                        <td>${b.title||'-'}</td>
                        <td>${b.link_url||'-'}</td>
                        <td>${b.sort_order}</td>
                        <td><span class="status-badge status-${b.status}">${b.status==='active'?'启用':'禁用'}</span></td>
                        <td>
                            <div class="action-buttons">
                                <button class="btn-action btn-edit" data-id="${b.id}" data-action="editBanner">编辑</button>
                                <button class="btn-action btn-delete" data-id="${b.id}" data-action="deleteBanner">删除</button>
                            </div>
                        </td>
                    </tr>
                `).join('') : '<tr><td colspan="6"><div class="empty-state"><div class="empty-state-icon">🖼️</div><p>暂无轮播图</p></div></td></tr>';
                attachBannerEvents();
            });
        }

        async function openBannerModal(id = null) {
            editingBanner = null;
            if (id) {
                const {data:b} = await DB.from('banners').select('*').eq('id',id).single();
                if (b) {
                    editingBanner = b;
                    document.getElementById('bannerModalTitle').textContent = '编辑轮播图';
                    document.getElementById('bannerId').value = b.id;
                    document.getElementById('bannerTitle').value = b.title||'';
                    document.getElementById('bannerImage').value = b.image_url;
                    document.getElementById('bannerLink').value = b.link_url||'';
                    document.getElementById('bannerSort').value = b.sort_order;
                    document.getElementById('bannerStatus').value = b.status;
                }
            } else {
                document.getElementById('bannerModalTitle').textContent = '添加轮播图';
                document.getElementById('bannerId').value = '';
                document.getElementById('bannerTitle').value = '';
                document.getElementById('bannerImage').value = '';
                document.getElementById('bannerLink').value = '';
                document.getElementById('bannerSort').value = '0';
                document.getElementById('bannerStatus').value = 'active';
            }
            document.getElementById('bannerModal').classList.add('active');
        }

        document.getElementById('addBannerBtn').addEventListener('click', () => openBannerModal());
        document.getElementById('closeBannerModal').addEventListener('click', () => document.getElementById('bannerModal').classList.remove('active'));
        document.getElementById('cancelBannerBtn').addEventListener('click', () => document.getElementById('bannerModal').classList.remove('active'));
        document.getElementById('saveBannerBtn').addEventListener('click', async function() {
            const id = document.getElementById('bannerId').value;
            const data = {
                title: document.getElementById('bannerTitle').value,
                image_url: document.getElementById('bannerImage').value,
                link_url: document.getElementById('bannerLink').value,
                sort_order: parseInt(document.getElementById('bannerSort').value)||0,
                status: document.getElementById('bannerStatus').value
            };
            if (!data.image_url) return showToast('请填写图片URL','error');
            try {
                if (id) {
                    await DB.from('banners').update(data).eq('id',id);
                    showToast('更新成功','success');
                } else {
                    await DB.from('banners').insert([data]);
                    showToast('添加成功','success');
                }
                document.getElementById('bannerModal').classList.remove('active');
                loadBanners();
            } catch(e) {
                showToast('保存失败: '+e.message,'error');
            }
        });

        function attachBannerEvents() {
            document.querySelectorAll('[data-action="editBanner"]').forEach(btn => {
                btn.addEventListener('click', () => openBannerModal(btn.getAttribute('data-id')));
            });
            document.querySelectorAll('[data-action="deleteBanner"]').forEach(btn => {
                btn.addEventListener('click', async function() {
                    if (confirm('确定删除？')) {
                        await DB.from('banners').delete().eq('id',this.getAttribute('data-id'));
                        showToast('删除成功','success');
                        loadBanners();
                    }
                });
            });
        }

        // 设置
        function loadSettings() {
            DB.from('settings').select('*').then(({data,error}) => {
                if (error) return showToast('加载失败: '+error.message,'error');
                data.forEach(s => {
                    const map = {
                        'site_name':'siteName','site_slogan':'siteSlogan','payment_qr_code':'paymentQrCode',
                        'contact_telegram':'contactTelegram','contact_phone':'contactPhone',
                        'contact_group':'contactGroup','contact_channel':'contactChannel'
                    };
                    if (map[s.key_name]) document.getElementById(map[s.key_name]).value = s.value||'';
                });
            });
        }

        document.getElementById('saveSettingsBtn').addEventListener('click', async function() {
            const settings = [
                {key_name:'site_name',value:document.getElementById('siteName').value},
                {key_name:'site_slogan',value:document.getElementById('siteSlogan').value},
                {key_name:'payment_qr_code',value:document.getElementById('paymentQrCode').value},
                {key_name:'contact_telegram',value:document.getElementById('contactTelegram').value},
                {key_name:'contact_phone',value:document.getElementById('contactPhone').value},
                {key_name:'contact_group',value:document.getElementById('contactGroup').value},
                {key_name:'contact_channel',value:document.getElementById('contactChannel').value}
            ];
            try {
                for (const s of settings) {
                    await DB.from('settings').upsert(s,{onConflict:'key_name'});
                }
                showToast('保存成功','success');
            } catch(e) {
                showToast('保存失败: '+e.message,'error');
            }
        });

        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === this) this.classList.remove('active');
            });
        });
    })();
    </script>
</body>
</html>

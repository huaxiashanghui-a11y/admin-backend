<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北苍星际 - 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f5f5f5; min-height: 100vh; }
        
        .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        
        .login-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.3); width: 400px; text-align: center; }
        
        .login-title { font-size: 28px; font-weight: bold; color: #667eea; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 20px; text-align: left; }
        
        .form-label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        
        .form-input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 14px; transition: border-color 0.3s; }
        
        .form-input:focus { outline: none; border-color: #667eea; }
        
        .btn-login { width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        
        .btn-login:hover { transform: scale(1.05); }
        
        .admin-container { display: none; min-height: 100vh; }
        
        .sidebar { position: fixed; left: 0; top: 0; width: 250px; height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 0; z-index: 1000; }
        
        .sidebar-header { text-align: center; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 20px; }
        
        .sidebar-title { font-size: 24px; font-weight: bold; }
        
        .sidebar-subtitle { font-size: 12px; opacity: 0.8; margin-top: 5px; }
        
        .sidebar-menu { list-style: none; padding: 0; }
        
        .sidebar-item { padding: 15px 25px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 10px; }
        
        .sidebar-item:hover { background: rgba(255,255,255,0.1); }
        
        .sidebar-item.active { background: rgba(255,255,255,0.2); border-left: 4px solid white; }
        
        .sidebar-logout { position: absolute; bottom: 20px; left: 0; right: 0; padding: 15px 25px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 10px; border-top: 1px solid rgba(255,255,255,0.2); margin-top: 20px; }
        
        .sidebar-logout:hover { background: rgba(255,255,255,0.1); }
        
        .main-content { margin-left: 250px; padding: 30px; min-height: 100vh; }
        
        .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .page-title { font-size: 28px; font-weight: bold; color: #333; }
        
        .btn-add { padding: 12px 25px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        
        .btn-add:hover { transform: scale(1.05); }
        
        .btn-export { padding: 12px 25px; background: #10b981; color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; transition: transform 0.2s; margin-left: 10px; }
        
        .btn-export:hover { transform: scale(1.05); background: #0d9488; }
        
        .data-table { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        
        table { width: 100%; border-collapse: collapse; }
        
        th { background: #f8f9fa; padding: 15px; text-align: left; font-weight: bold; color: #333; border-bottom: 2px solid #e0e0e0; }
        
        td { padding: 15px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
        
        tr:hover { background: #f8f9fa; }
        
        .product-image { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; }
        
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        
        .status-active { background: #d4edda; color: #155724; }
        
        .status-inactive { background: #f8d7da; color: #721c24; }
        
        .action-buttons { display: flex; gap: 8px; }
        
        .btn-action { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; transition: all 0.2s; }
        
        .btn-edit { background: #667eea; color: white; }
        
        .btn-edit:hover { background: #764ba2; }
        
        .btn-delete { background: #e74c3c; color: white; }
        
        .btn-delete:hover { background: #c0392b; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        
        .modal.active { display: flex; }
        
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 700px; max-height: 80vh; overflow-y: auto; }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; }
        
        .modal-title { font-size: 24px; font-weight: bold; color: #667eea; }
        
        .modal-close { font-size: 30px; cursor: pointer; color: #999; transition: color 0.3s; }
        
        .modal-close:hover { color: #333; }
        
        .modal-body { margin-bottom: 20px; }
        
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; padding-top: 15px; border-top: 2px solid #f0f0f0; padding-bottom: 15px; }
        
        .btn-cancel { padding: 10px 20px; background: #e0e0e0; color: #333; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
        
        .btn-save { padding: 10px 20px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; }
        
        .price-list { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        
        .price-item { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        
        .price-item:last-child { margin-bottom: 0; }
        
        .price-input { flex: 1; padding: 8px; border: 1px solid #e0e0e0; border-radius: 6px; }
        
        .btn-remove-price { padding: 8px 12px; background: #e74c3c; color: white; border: none; border-radius: 6px; cursor: pointer; }
        
        .btn-add-price { width: 100%; padding: 10px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        
        .toast { position: fixed; top: 20px; right: 20px; padding: 15px 25px; background: white; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); z-index: 3000; display: none; animation: slideIn 0.3s ease; }
        
        .toast.show { display: block; }
        
        .toast.success { border-left: 4px solid #28a745; }
        
        .toast.error { border-left: 4px solid #dc3545; }
        
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        
        .empty-state-icon { font-size: 60px; margin-bottom: 20px; }
        
        @media (max-width: 768px) {
            .sidebar { width: 200px; }
            .main-content { margin-left: 200px; padding: 20px; }
            .login-box { width: 90%; }
        }
    </style>
</head>
<body>
    <!-- 登录界面 -->
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h1 class="login-title">🏙️ 北苍星际管理后台</h1>
            <div class="form-group">
                <label class="form-label">登录密码</label>
                <input type="password" class="form-input" id="password" placeholder="请输入密码">
            </div>
            <button class="btn-login" onclick="handleLogin()">登录</button>
        </div>
    </div>

    <!-- 管理后台主界面 -->
    <div class="admin-container" id="adminContainer">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2 class="sidebar-title">北苍星际</h2>
                <p class="sidebar-subtitle">管理后台</p>
            </div>
            <ul class="sidebar-menu">
                <li class="sidebar-item active" onclick="showPage('products')">📦 商品管理</li>
                <li class="sidebar-item" onclick="showPage('categories')">📂 分类管理</li>
                <li class="sidebar-item" onclick="showPage('settings')">⚙️ 系统设置</li>
            </ul>
            <div class="sidebar-logout" onclick="handleLogout()">🚪 退出登录</div>
        </div>

        <div class="main-content">
            <!-- 商品管理页面 -->
            <div id="productsPage">
                <div class="content-header">
                    <h1 class="page-title">商品管理</h1>
                    <div>
                        <button class="btn-add" onclick="openProductModal()">+ 添加商品</button>
                        <button class="btn-export" onclick="exportData()">📥 导出数据</button>
                    </div>
                </div>
                <div class="data-table">
                    <table id="productsTable">
                        <thead>
                            <tr>
                                <th>图片</th>
                                <th>商品名称</th>
                                <th>分类</th>
                                <th>状态</th>
                                <th>价格数量</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- 分类管理页面 -->
            <div id="categoriesPage" style="display: none;">
                <div class="content-header">
                    <h1 class="page-title">分类管理</h1>
                </div>
                <div class="data-table">
                    <table id="categoriesTable">
                        <thead>
                            <tr>
                                <th>图标</th>
                                <th>分类名称</th>
                                <th>标识符</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="categoriesTableBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- 系统设置页面 -->
            <div id="settingsPage" style="display: none;">
                <div class="content-header">
                    <h1 class="page-title">系统设置</h1>
                </div>
                <div style="background: white; padding: 30px; border-radius: 15px;">
                    <div class="form-group">
                        <label class="form-label">网站名称</label>
                        <input type="text" class="form-input" id="siteName" placeholder="请输入网站名称">
                    </div>
                    <div class="form-group">
                        <label class="form-label">网站口号</label>
                        <input type="text" class="form-input" id="siteSlogan" placeholder="请输入网站口号">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Wavepay收款码</label>
                        <input type="text" class="form-input" id="paymentQrCode" placeholder="请输入收款码图片URL">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Telegram客服</label>
                        <input type="text" class="form-input" id="contactTelegram" placeholder="请输入Telegram用户名">
                    </div>
                    <div class="form-group">
                        <label class="form-label">联系电话</label>
                        <input type="text" class="form-input" id="contactPhone" placeholder="请输入联系电话">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Telegram群组</label>
                        <input type="text" class="form-input" id="contactGroup" placeholder="请输入群组ID">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Telegram频道</label>
                        <input type="text" class="form-input" id="contactChannel" placeholder="请输入频道ID">
                    </div>
                    <button class="btn-add" style="margin-top: 20px;" onclick="saveSettings()">💾 保存设置</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 商品编辑弹窗 -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="productModalTitle">添加商品</h2>
                <span class="modal-close" onclick="closeProductModal()">&times;</span>
            </div>
            <div class="modal-body">
                <input type="hidden" id="productId">
                <div class="form-group">
                    <label class="form-label">商品名称 *</label>
                    <input type="text" class="form-input" id="productName" placeholder="请输入商品名称">
                </div>
                <div class="form-group">
                    <label class="form-label">分类 *</label>
                    <select class="form-input" id="productCategory">
                        <!-- 分类选项将通过 JavaScript 加载 -->
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">子分类</label>
                    <input type="text" class="form-input" id="productSubCategory" placeholder="如：kuaishou, douyin">
                </div>
                <div class="form-group">
                    <label class="form-label">商品图片URL *</label>
                    <input type="text" class="form-input" id="productImage" placeholder="请输入图片URL（如：https://i.imgur.com/xxx.jpg）">
                </div>
                <div class="form-group">
                    <label class="form-label">商品描述</label>
                    <textarea class="form-input" id="productDescription" rows="3" placeholder="请输入商品描述"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">状态</label>
                    <select class="form-input" id="productStatus">
                        <option value="true">启用</option>
                        <option value="false">禁用</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">价格列表</label>
                    <div class="price-list" id="priceList"></div>
                    <button class="btn-add-price" onclick="addPriceItem()">+ 添加价格</button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeProductModal()">取消</button>
                <button class="btn-save" onclick="saveProduct()">保存</button>
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <script>
        // ==================== 全局变量 ====================
        const ADMIN_PASSWORD = 'beicang888';
        let products = [];
        let currentPrices = [];
        let editingProduct = null;
        let settings = {};

        // ==================== 分类数据 ====================
        const categories = [
            { slug: 'all', name: '全部商品', icon: '📦' },
            { slug: 'live', name: '直播平台', icon: '📺' },
            { slug: 'voice', name: '语音交友', icon: '🎤' },
            { slug: 'play', name: '陪玩陪聊', icon: '🎮' },
            { slug: 'game', name: '游戏充值', icon: '🎯' },
            { slug: 'card', name: '平台点卡', icon: '💳' },
            { slug: 'anime', name: '文学动漫', icon: '📚' },
            { slug: 'video', name: '视频音频', icon: '🎬' },
            { slug: 'social', name: '社交媒体', icon: '👥' },
            { slug: 'speed', name: '加速工具', icon: '⚡' },
            { slug: 'daily', name: '生活日常', icon: '🏠' }
        ];

        // ==================== 工具函数 ====================
        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show ' + type;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function getCategoryName(slug) {
            const cat = categories.find(c => c.slug === slug);
            return cat ? cat.name : slug;
        }

        // ==================== localStorage 操作 ====================
        function saveToLocalStorage() {
            const data = {
                products: products,
                settings: settings
            };
            localStorage.setItem('beicang_data', JSON.stringify(data));
            console.log('数据已保存到 localStorage');
        }

        function loadFromLocalStorage() {
            const data = localStorage.getItem('beicang_data');
            if (data) {
                const parsed = JSON.parse(data);
                products = parsed.products || [];
                settings = parsed.settings || {};
                console.log('从 localStorage 加载了数据');
            }
        }

        // ==================== 登录 ====================
        function handleLogin() {
            const password = document.getElementById('password').value;
            if (password === ADMIN_PASSWORD) {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('adminContainer').style.display = 'block';
                loadFromLocalStorage();
                renderProducts();
                renderCategories();
                loadSettings();
                showToast('登录成功', 'success');
            } else {
                showToast('密码错误', 'error');
            }
        }

        // 退出登录
        function handleLogout() {
            if (confirm('确定要退出登录吗？')) {
                document.getElementById('adminContainer').style.display = 'none';
                document.getElementById('loginContainer').style.display = 'flex';
                document.getElementById('password').value = '';
                showToast('已退出登录', 'success');
            }
        }

        // 显示页面
        function showPage(page) {
            document.querySelectorAll('.sidebar-item').forEach(item => {
                item.classList.remove('active');
            });

            event.target.classList.add('active');

            document.querySelectorAll('.main-content > div').forEach(d => d.style.display = 'none');
            document.getElementById(page + 'Page').style.display = 'block';

            if (page === 'products') {
                renderProducts();
            } else if (page === 'categories') {
                renderCategories();
            } else if (page === 'settings') {
                loadSettings();
            }
        }

        // ==================== 商品管理 ====================

        function renderProducts() {
            const tbody = document.getElementById('productsTableBody');

            if (!products || products.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6">
                            <div class="empty-state">
                                <div class="empty-state-icon">📦</div>
                                <p>暂无商品数据</p>
                                <p style="font-size: 12px; margin-top: 10px;">点击上方 '+ 添加商品' 按钮添加第一个商品</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = products.map(product => `
                <tr>
                    <td><img src="${product.image}" alt="${product.name}" class="product-image"></td>
                    <td>${product.name}</td>
                    <td>${getCategoryName(product.category)}</td>
                    <td>
                        <span class="status-badge status-${product.status === 'true' ? 'active' : 'inactive'}">
                            ${product.status === 'true' ? '启用' : '禁用'}
                        </span>
                    </td>
                    <td>${product.prices ? product.prices.length : 0} 个</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn-action btn-edit" onclick="editProduct('${product.id}')">编辑</button>
                            <button class="btn-action btn-delete" onclick="deleteProduct('${product.id}')">删除</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function openProductModal(productId = null) {
            editingProduct = null;
            currentPrices = [];

            // 填充分类选项
            const categorySelect = document.getElementById('productCategory');
            categorySelect.innerHTML = categories.map(cat =>
                `<option value="${cat.slug}">${cat.name}</option>`
            ).join('');

            if (productId) {
                const product = products.find(p => p.id === productId);
                if (product) {
                    editingProduct = product;
                    document.getElementById('productModalTitle').textContent = '编辑商品';
                    document.getElementById('productId').value = product.id;
                    document.getElementById('productName').value = product.name;
                    document.getElementById('productCategory').value = product.category;
                    document.getElementById('productSubCategory').value = product.subCategory || '';
                    document.getElementById('productImage').value = product.image;
                    document.getElementById('productDescription').value = product.description || '';
                    document.getElementById('productStatus').value = product.status ? 'true' : 'false';

                    currentPrices = product.prices || [];
                    renderPriceList();
                }
            } else {
                document.getElementById('productModalTitle').textContent = '添加商品';
                document.getElementById('productId').value = '';
                document.getElementById('productName').value = '';
                document.getElementById('productSubCategory').value = '';
                document.getElementById('productImage').value = '';
                document.getElementById('productDescription').value = '';
                document.getElementById('productStatus').value = 'true';
                currentPrices = [];
                renderPriceList();
            }

            document.getElementById('productModal').classList.add('active');
        }

        function closeProductModal() {
            document.getElementById('productModal').classList.remove('active');
            editingProduct = null;
            currentPrices = [];
        }

        function renderPriceList() {
            document.getElementById('priceList').innerHTML = currentPrices.map((price, index) => `
                <div class="price-item">
                    <input type="text" class="price-input" placeholder="规格名称"
                           value="${price.name}" onchange="updatePrice(${index}, 'name', this.value)">
                    <input type="text" class="price-input" placeholder="价格"
                           value="${price.value}" onchange="updatePrice(${index}, 'value', this.value)">
                    <button class="btn-remove-price" onclick="removePriceItem(${index})">删除</button>
                </div>
            `).join('');
        }

        function addPriceItem() {
            currentPrices.push({ name: '', value: '' });
            renderPriceList();
        }

        function removePriceItem(index) {
            currentPrices.splice(index, 1);
            renderPriceList();
        }

        function updatePrice(index, field, value) {
            currentPrices[index][field] = value;
        }

        function editProduct(productId) {
            openProductModal(productId);
        }

        function saveProduct() {
            const id = document.getElementById('productId').value;
            const productData = {
                name: document.getElementById('productName').value,
                category: document.getElementById('productCategory').value,
                subCategory: document.getElementById('productSubCategory').value,
                image: document.getElementById('productImage').value,
                description: document.getElementById('productDescription').value,
                status: document.getElementById('productStatus').value === 'true'
            };

            if (!productData.name || !productData.category || !productData.image) {
                showToast('请填写必填字段', 'error');
                return;
            }

            productData.prices = currentPrices.filter(p => p.name && p.value);

            if (id) {
                const index = products.findIndex(p => p.id === id);
                if (index !== -1) {
                    products[index] = productData;
                    showToast('商品更新成功', 'success');
                } else {
                    productData.id = Date.now().toString();
                    products.push(productData);
                    showToast('商品添加成功', 'success');
                }
            } else {
                productData.id = Date.now().toString();
                products.push(productData);
                showToast('商品添加成功', 'success');
            }

            saveToLocalStorage();
            closeProductModal();
            renderProducts();
        }

        function deleteProduct(productId) {
            if (!confirm('确定要删除这个商品吗？')) return;

            products = products.filter(p => p.id !== productId);
            saveToLocalStorage();
            renderProducts();
            showToast('商品删除成功', 'success');
        }

        // ==================== 分类管理 ====================

        function renderCategories() {
            const tbody = document.getElementById('categoriesTableBody');

            if (!categories || categories.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5">
                            <div class="empty-state">
                                <div class="empty-state-icon">📂</div>
                                <p>暂无分类数据</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = categories.map(category => `
                <tr>
                    <td style="font-size: 24px;">${category.icon || '📦'}</td>
                    <td>${category.name}</td>
                    <td>${category.slug}</td>
                    <td>
                        <span style="color: #999; font-size: 12px;">(默认分类)</span>
                    </td>
                </tr>
            `).join('');
        }

        // ==================== 系统设置 ====================

        function loadSettings() {
            document.getElementById('siteName').value = settings.siteName || '';
            document.getElementById('siteSlogan').value = settings.siteSlogan || '';
            document.getElementById('paymentQrCode').value = settings.paymentQrCode || '';
            document.getElementById('contactTelegram').value = settings.contactTelegram || '';
            document.getElementById('contactPhone').value = settings.contactPhone || '';
            document.getElementById('contactGroup').value = settings.contactGroup || '';
            document.getElementById('contactChannel').value = settings.contactChannel || '';
        }

        function saveSettings() {
            settings.siteName = document.getElementById('siteName').value;
            settings.siteSlogan = document.getElementById('siteSlogan').value;
            settings.paymentQrCode = document.getElementById('paymentQrCode').value;
            settings.contactTelegram = document.getElementById('contactTelegram').value;
            settings.contactPhone = document.getElementById('contactPhone').value;
            settings.contactGroup = document.getElementById('contactGroup').value;
            settings.contactChannel = document.getElementById('contactChannel').value;
            saveToLocalStorage();
            showToast('设置保存成功', 'success');
        }

        function exportData() {
            const data = {
                exportTime: new Date().toISOString(),
                products: products,
                categories: categories,
                settings: settings
            };

            const jsonStr = JSON.stringify(data, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = `beicang_data_${Date.now()}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showToast('数据导出成功', 'success');
        }

        // 点击弹窗外部关闭
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('active');
            }
        }
    </script>
</body>
</html>
